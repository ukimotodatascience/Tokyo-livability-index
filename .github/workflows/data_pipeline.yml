name: Tokyo Livability Data Pipeline

on:
  schedule:
    # 毎月1日の UTC 00:00 (JST 09:00) に実行
    - cron: '0 0 1 * *'
  workflow_dispatch:
    # GitHub UI からの手動実行を有効化

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      # リポジトリへの書き込み権限を設定（自動コミットプッシュ用）
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt

      - name: Run data pipeline
        env:
          ESTAT_API_KEY: ${{ secrets.ESTAT_API_KEY }}
        run: |
          python main.py

      - name: Commit and push changes
        run: |
          # 差分があるか確認
          if [ -n "$(git status --porcelain)" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add data/processed/tokyo_livability_index.csv assets/embedded-data.js data/raw/*.csv
            git commit -m "chore: 統計データを最新に自動更新 [skip ci]"
            git push
          else
            echo "No changes detected. Skipping commit."
          fi
